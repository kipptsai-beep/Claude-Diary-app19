<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我的日記 - 時光機修復版</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    :root { --primary-color: #e8784a; --bg-color: #fdf6f0; }
    *{ margin:0; padding:0; box-sizing:border-box; font-family:-apple-system,'Noto Sans TC',system-ui; }
    body{ background: var(--bg-color); height:100vh; overflow:hidden; }
    #app{ max-width:480px; margin:0 auto; height:100vh; display:flex; flex-direction:column; }
    .login-wrap{ flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
    .login-card{ width:100%; background:white; border-radius:28px; padding:28px; box-shadow:0 10px 40px rgba(0,0,0,.08); }
    input.log-in{ width:100%; padding:14px; border-radius:18px; border:1px solid #eee; margin-bottom:12px; font-size:16px; }
    .btn-main{ width:100%; border:none; background: var(--primary-color); color:white; padding:15px; border-radius:18px; font-size:16px; font-weight:700; cursor:pointer; }
    #mainApp{ display:none; flex-direction:column; flex:1; }
    .home-header{ background:linear-gradient(135deg, var(--primary-color), #c44a1e); color:white; padding:28px 20px 22px; text-align:center; }
    .ocr-import-btn{ margin-top:18px; width:100%; border:none; background:white; color:#c44a1e; border-radius:20px; padding:16px; font-size:17px; font-weight:800; cursor:pointer; }
    .calendar-nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 10px 10px; background: white; border-radius: 20px 20px 0 0; margin: 10px 14px 0; }
    .nav-btn { font-size: 24px; color: var(--primary-color); cursor: pointer; padding: 0 15px; }
    .current-view { font-size: 20px; font-weight: 800; color: #333; cursor: pointer; }
    .calendar-wrap{ flex:1; overflow-y:auto; padding:0 14px 14px; }
    .cal-container { background: white; border-radius: 0 0 20px 20px; padding: 10px; }
    .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
    .cal-day-name{ text-align:center; font-size:12px; color:#999; padding:8px 0; }
    .cal-day{ aspect-ratio:1; background:#f9f9f9; border-radius:14px; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; }
    .cal-day.has-entry{ background:#fff0e8; color: var(--primary-color); font-weight:700; }
    #editorPage{ display:none; flex-direction:column; position:fixed; inset:0; background: var(--bg-color); z-index:100; }
    .editor-header{ background:white; padding:14px; display:flex; align-items:center; border-bottom:1px solid #eee; }
    .editor-body{ flex:1; overflow-y:auto; padding:18px; background:white; margin:10px; border-radius:15px; }
    #diaryEditor{ min-height:100%; outline:none; font-size:17px; line-height:1.8; }
    .jump-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 2000; }
    .jump-box { width: 85%; background: white; border-radius: 24px; padding: 24px; }
    .preview-layer, #ocrLoading { position:fixed; inset:0; display:none; flex-direction:column; z-index:5000; }
    #ocrLoading { background:rgba(0,0,0,0.9); color:white; align-items:center; justify-content:center; text-align:center; padding:20px; }
    .preview-layer { background:black; }
</style>
</head>
<body>

<div id="app">
    <div id="loginPage" class="login-wrap">
        <div class="login-card">
            <div style="font-size:50px; text-align:center;">📔</div>
            <h2 style="text-align:center; margin:10px 0 20px;">我的日記</h2>
            <input type="email" id="loginEmail" class="log-in" placeholder="Email">
            <input type="password" id="loginPassword" class="log-in" placeholder="密碼">
            <button class="btn-main" onclick="doLogin()">進入時光機</button>
        </div>
    </div>

    <div id="mainApp">
        <div class="home-header">
            <h1>我的日記</h1>
            <button class="ocr-import-btn" onclick="startOCRImport()">📸 Google AI 匯入舊日記</button>
        </div>
        <div class="calendar-nav">
            <div class="nav-btn" onclick="changeMonth(-1)">‹</div>
            <div class="current-view" onclick="showJumpModal()">
                <span id="viewYear">2026</span>年 <span id="viewMonth">5</span>月
            </div>
            <div class="nav-btn" onclick="changeMonth(1)">›</div>
        </div>
        <div class="calendar-wrap">
            <div class="cal-container">
                <div class="cal-grid">
                    <div class="cal-day-name">日</div><div class="cal-day-name">一</div><div class="cal-day-name">二</div>
                    <div class="cal-day-name">三</div><div class="cal-day-name">四</div><div class="cal-day-name">五</div><div class="cal-day-name">六</div>
                </div>
                <div id="calGrid" class="cal-grid"></div>
            </div>
        </div>
    </div>

    <div id="editorPage">
        <div class="editor-header">
            <div onclick="backHome()" style="font-size:28px; margin-right:12px; cursor:pointer; color:var(--primary-color);">←</div>
            <div id="editorDateLabel" style="font-weight:bold;"></div>
            <button class="btn-main" style="width:auto; padding:8px 20px; margin-left:auto;" onclick="saveEntry()">儲存</button>
        </div>
        <div class="editor-body">
            <div id="diaryEditor" contenteditable="true"></div>
        </div>
    </div>

    <input type="file" id="cameraInput" accept="image/*" style="display:none" onchange="handleFile(this)">
    <div id="jumpModal" class="jump-modal" onclick="this.style.display='none'">
        <div class="jump-box" onclick="event.stopPropagation()">
            <h3 style="text-align:center; margin-bottom:15px;">快速跳轉年月</h3>
            <select id="jumpYear" style="width:100%; padding:10px; margin-bottom:10px;"></select>
            <select id="jumpMonth" style="width:100%; padding:10px; margin-bottom:15px;"></select>
            <button class="btn-main" onclick="executeJump()">確定跳轉</button>
        </div>
    </div>
    <div id="previewLayer" class="preview-layer">
        <div style="flex:1; display:flex; align-items:center; justify-content:center;"><img id="previewImage" style="max-width:100%; max-height:80vh;"></div>
        <div style="display:flex; gap:10px; padding:20px;">
            <button class="btn-main" style="background:#444;" onclick="retryPhoto()">重拍</button>
            <button class="btn-main" onclick="runOCR()">確認辨識</button>
        </div>
    </div>
    <div id="ocrLoading">🔍 AI 正在努力閱讀中...</div>
</div>

<script>
const SUPABASE_URL = "https://rsuguwhgzyyvhlehpqqu.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzdWd1d2hnenl5dmhsZWhwcXF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5ODU4NDUsImV4cCI6MjA5MzU2MTg0NX0.SX9ixJYye0GNdKvcJ5c3FZAeN9s1B_oX7XnU8xwbkR8";
const GOOGLE_KEY = "在此貼上你的_GOOGLE_API_KEY"; 

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
let currentUser = null, entries = {}, currentYear = 2026, currentMonth = 5, editingDate = '';

// 初始化與登入
async function boot(){
    const { data:{ user } } = await sb.auth.getUser();
    if(user) {
        currentUser = user;
        document.getElementById('loginPage').style.display='none';
        document.getElementById('mainApp').style.display='flex';
        await loadEntries();
        renderCalendar();
    }
}
window.onload = boot;

async function doLogin(){
    let email = document.getElementById('loginEmail').value;
    let password = document.getElementById('loginPassword').value;
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if(error) alert("登入失敗：" + error.message); else boot();
}

async function loadEntries(){
    const { data } = await sb.from('diary_entries').select('date, content_html').eq('user_id', currentUser.id);
    entries = {}; (data || []).forEach(e => { entries[e.date] = e; });
}

function renderCalendar(){
    document.getElementById('viewYear').innerText = currentYear;
    document.getElementById('viewMonth').innerText = currentMonth;
    let firstDay = new Date(currentYear, currentMonth - 1, 1).getDay();
    let totalDays = new Date(currentYear, currentMonth, 0).getDate();
    let html = '';
    for(let i=0; i<firstDay; i++) html += `<div class="cal-day" style="background:transparent;"></div>`;
    for(let d=1; d<=totalDays; d++){
        let dateKey = `${currentYear}-${String(currentMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        let cls = entries[dateKey] ? 'cal-day has-entry' : 'cal-day';
        html += `<div class="${cls}" onclick="openEditor('${dateKey}')">${d}</div>`;
    }
    document.getElementById('calGrid').innerHTML = html;
}

// 跳轉與月份切換
function changeMonth(delta){ currentMonth += delta; if(currentMonth>12){currentMonth=1;currentYear++;} if(currentMonth<1){currentMonth=12;currentYear--;} renderCalendar(); }
function showJumpModal(){
    const ySel = document.getElementById('jumpYear'), mSel = document.getElementById('jumpMonth');
    ySel.innerHTML = ''; mSel.innerHTML = '';
    for(let y=2026; y>=1980; y--) ySel.innerHTML += `<option value="${y}">${y}年</option>`;
    for(let m=1; m<=12; m++) mSel.innerHTML += `<option value="${m}">${m}月</option>`;
    ySel.value = currentYear; mSel.value = currentMonth;
    document.getElementById('jumpModal').style.display = 'flex';
}
function executeJump(){ currentYear = parseInt(document.getElementById('jumpYear').value); currentMonth = parseInt(document.getElementById('jumpMonth').value); document.getElementById('jumpModal').style.display='none'; renderCalendar(); }

// 編輯與儲存
function openEditor(dateKey, initialContent = null){
    editingDate = dateKey;
    document.getElementById('editorDateLabel').innerText = dateKey;
    document.getElementById('diaryEditor').innerHTML = initialContent || entries[dateKey]?.content_html || '';
    document.getElementById('mainApp').style.display = 'none';
    document.getElementById('editorPage').style.display = 'flex';
}
function backHome(){ document.getElementById('editorPage').style.display = 'none'; document.getElementById('mainApp').style.display = 'flex'; renderCalendar(); }
async function saveEntry(){
    let html = document.getElementById('diaryEditor').innerHTML;
    const { error } = await sb.from('diary_entries').upsert({ user_id: currentUser.id, date: editingDate, content_html: html });
    if(error) alert("儲存失敗"); else { alert("儲存成功"); await loadEntries(); backHome(); }
}

// OCR 邏輯
function startOCRImport(){ document.getElementById('cameraInput').click(); }
function handleFile(input){
    if(input.files && input.files[0]){
        let reader = new FileReader();
        reader.onload = e => { document.getElementById('previewImage').src = e.target.result; document.getElementById('previewLayer').style.display='flex'; };
        reader.readAsDataURL(input.files[0]);
    }
}
function retryPhoto(){ document.getElementById('previewLayer').style.display='none'; startOCRImport(); }

async function runOCR(){
    let base64 = document.getElementById('previewImage').src.split(',')[1];
    document.getElementById('previewLayer').style.display = 'none';
    document.getElementById('ocrLoading').style.display = 'flex';

    try {
        const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${GOOGLE_KEY}`, {
            method: 'POST',
            body: JSON.stringify({ requests: [{ image: { content: base64 }, features: [{ type: 'TEXT_DETECTION' }] }] })
        });
        const data = await res.json();
        
        if(data.error) throw new Error(data.error.message);
        
        const fullText = data.responses?.[0]?.fullTextAnnotation?.text || "";
        if(!fullText) throw new Error("未能辨識文字，請重新拍照");

        // 日期偵測 (專門優化 1987)
        let detectedDate = findDate(fullText);
        if(detectedDate){
            alert("偵測到日期：" + detectedDate);
            openEditor(detectedDate, fullText.replace(/\n/g, '<br>'));
        } else {
            alert("未偵測到日期，請手動選擇歸檔日期。");
            openEditor("2026-05-12", fullText.replace(/\n/g, '<br>'));
        }
    } catch(e) {
        alert("OCR 失敗：" + e.message);
    } finally {
        document.getElementById('ocrLoading').style.display = 'none';
    }
}

function findDate(text){
    let clean = text.replace(/\s+/g, '');
    // 匹配：西元1987年一月一日 或 1987-01-01
    let m = clean.match(/(\d{4})年([一二三四五六七八九十]{1,2})月([一二三四五六七八九十]{1,3})日/);
    if(m){
        const ch = {"一":1,"二":2,"三":3,"四":4,"五":5,"六":6,"七":7,"八":8,"九":9,"十":10,"十一":11,"十二":12};
        return `${m[1]}-${String(ch[m[2]]).padStart(2,'0')}-${String(ch[m[3]]||1).padStart(2,'0')}`;
    }
    let m2 = clean.match(/(\d{4})[\/\-年](\d{1,2})[\/\-月](\d{1,2})/);
    if(m2) return `${m2[1]}-${String(m2[2]).padStart(2,'0')}-${String(m2[3]).padStart(2,'0')}`;
    return null;
}
</script>
</body>
</html>
